<style>
        body {
            background-color: #0B0B0B;
            color: #e5e2e1;
            overflow-x: hidden;
        }
        
        /* Glassmorphism utility classes */
        .glass-panel {
            background-color: rgba(27, 27, 27, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glass-input {
            background-color: rgba(27, 27, 27, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .glass-input:focus {
            border-color: #ff5545; /* Primary Red */
            outline: none;
            box-shadow: 0 0 10px rgba(255, 85, 69, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff5545 0%, #b2001b 100%);
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.3);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            box-shadow: 0 0 30px rgba(255, 59, 48, 0.5);
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background-color: transparent;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            border-color: rgba(255, 255, 255, 0.5);
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Animated background elements */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 20s infinite ease-in-out alternate;
        }
        
        .orb-red {
            background: rgba(255, 85, 69, 0.15);
            width: 400px;
            height: 400px;
            top: -100px;
            right: -100px;
        }
        
        .orb-dark {
            background: rgba(42, 42, 42, 0.5);
            width: 500px;
            height: 500px;
            bottom: -200px;
            left: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, 50px) scale(1.1); }
            100% { transform: translate(20px, -20px) scale(0.9); }
        }
    </style>
<style>
    body {

</div>
<!-- Login Container -->
<main class="w-full max-w-[480px] z-10">
<!-- Brand Header -->
<div class="text-center mb-lg">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg font-bold text-on-surface tracking-tight mb-xs">AI-Based Fitness</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Elevate your performance.</p>
</div>
<!-- Glass Card -->
<div class="glass-panel rounded-xl p-md md:p-lg w-full flex flex-col gap-md">
<div class="text-center mb-sm">
<h2 class="font-title-md text-title-md text-on-surface mb-base">Welcome Back</h2>
<p class="font-body-sm text-body-sm text-tertiary">Enter your credentials to continue your journey.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-sm w-full" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="relative w-full">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-tertiary-container font-light" style="font-variation-settings: 'wght' 200;">mail</span>
</div>
<input class="glass-input w-full h-[56px] rounded-lg pl-[48px] pr-sm text-on-surface placeholder-tertiary-container focus:ring-0 focus:border-primary-container block font-body-lg" id="email" placeholder="Email Address" required="" type="email"/>
</div>
<!-- Password Input -->
<div class="relative w-full">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-tertiary-container font-light" style="font-variation-settings: 'wght' 200;">lock</span>
</div>
<input class="glass-input w-full h-[56px] rounded-lg pl-[48px] pr-sm text-on-surface placeholder-tertiary-container focus:ring-0 focus:border-primary-container block font-body-lg" id="password" placeholder="Password" required="" type="password"/>
</div>
<!-- Forgot Password -->
<div class="flex justify-end w-full">
<a class="font-body-sm text-body-sm text-tertiary hover:text-primary transition-colors duration-200" href="#">Forgot Password?</a>
</div>
<!-- Log In Button -->
<button class="btn-primary w-full h-[56px] rounded-full text-white font-title-md text-title-md mt-sm flex items-center justify-center gap-xs" type="submit">
                    Log In
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center justify-center w-full my-xs">
<div class="h-[1px] bg-surface-container-highest flex-grow"></div>
<span class="font-label-caps text-label-caps text-tertiary px-sm uppercase tracking-wider">or</span>
<div class="h-[1px] bg-surface-container-highest flex-grow"></div>
</div>
<!-- Google Login -->
<button class="btn-secondary w-full h-[56px] rounded-full text-on-surface font-title-md text-title-md flex items-center justify-center gap-sm" type="button">

                Continue with Google
